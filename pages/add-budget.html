<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FinanceME — Create or Edit Budget." />

    <title>Create Budget — FinanceME</title>
    <link rel="icon" type="image/png" href="../Logo/logo_transparent.png" />

    <!-- ========== CSS ========== -->
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/layout.css" />

    <link rel="stylesheet" href="../css/budgets.css" />
  </head>

  <body>
    <div class="app-container">
      <div id="sidebar-container"></div>
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <div class="main-content">
        <div id="header-container"></div>

        <div class="content-wrapper">
          <div class="form-container">
            <header class="page-header">
              <a
                href="budgets.html"
                class="btn btn-ghost btn-sm"
                style="
                  display: inline-flex;
                  align-items: center;
                  margin-bottom: var(--space-md);
                  margin-left: -8px;
                "
              >
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="margin-right: 4px"
                >
                  <line x1="19" y1="12" x2="5" y2="12"></line>
                  <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Budgets
              </a>
              <h1 class="text-display" style="font-size: 28px">
                Create Budget
              </h1>
            </header>

            <form
              class="card"
              style="padding: var(--space-xl)"
              onsubmit="
                event.preventDefault();
                window.location.href = 'budgets.html';
              "
            >
              <div class="form-group" style="margin-bottom: var(--space-lg)">
                <label for="category" class="form-label">Category</label>
                <select id="category" class="form-input" required>
                  <option value="" disabled selected>Select a category</option>
                  <option value="housing">Housing</option>
                  <option value="food">Food & Dining</option>
                  <option value="transportation">Transportation</option>
                  <option value="utilities">Utilities</option>
                  <option value="shopping">Shopping</option>
                  <option value="entertainment">Entertainment</option>
                </select>
              </div>

              <div class="form-group" style="margin-bottom: var(--space-lg)">
                <label for="amount" class="form-label">Monthly Limit</label>
                <div class="amount-input-wrapper">
                  <span class="currency-symbol">$</span>
                  <input
                    type="number"
                    id="amount"
                    class="form-input"
                    step="0.01"
                    min="0"
                    placeholder="0.00"
                    required
                  />
                </div>
              </div>

              <div class="form-group" style="margin-bottom: var(--space-lg)">
                <label for="period" class="form-label">Time Period</label>
                <select id="period" class="form-input">
                  <option value="monthly" selected>
                    Monthly (Reset on the 1st)
                  </option>
                  <option value="weekly">Weekly</option>
                  <option value="yearly">Yearly</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Rollover Rules</label>
                <div
                  style="
                    display: flex;
                    flex-direction: column;
                    gap: var(--space-sm);
                    margin-top: var(--space-xs);
                  "
                >
                  <label
                    style="
                      display: flex;
                      align-items: center;
                      gap: 8px;
                      color: var(--text-primary);
                      cursor: pointer;
                      font-size: 14px;
                    "
                  >
                    <input
                      type="checkbox"
                      style="
                        accent-color: var(--accent-gold);
                        width: 16px;
                        height: 16px;
                      "
                    />
                    Rollover unused funds to the next month
                  </label>
                  <label
                    style="
                      display: flex;
                      align-items: center;
                      gap: 8px;
                      color: var(--text-primary);
                      cursor: pointer;
                      font-size: 14px;
                    "
                  >
                    <input
                      type="checkbox"
                      checked
                      style="
                        accent-color: var(--accent-gold);
                        width: 16px;
                        height: 16px;
                      "
                    />
                    Alert me when I reach 80% of limit
                  </label>
                </div>
              </div>

              <div class="btn-row">
                <button
                  type="button"
                  class="btn btn-ghost"
                  onclick="window.location.href = 'budgets.html'"
                >
                  Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                  Save Budget
                </button>
              </div>
            </form>
          </div>
        </div>

        <div id="footer-container"></div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/budgets.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        initSidebar("budgets");
        initHeader();
        if (typeof loadComponent === "function") {
          loadComponent("../components/footer.html", "footer-container");
        }
      });
    </script>
  </body>
</html>
