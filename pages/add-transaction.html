<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FinanceME — Add a new transaction manually to keep your records precise."
    />

    <title>Add Transaction — FinanceME</title>
    <link rel="icon" type="image/png" href="../Logo/logo_transparent.png" />

    <!-- ========== CSS ========== -->
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/transactions.css" />
  </head>

  <body>
    <div class="app-container">
      <div id="sidebar-container"></div>
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <div class="main-content">
        <div id="header-container"></div>

        <div class="content-wrapper">
          <div class="form-container">
            <header class="page-header">
              <a
                href="transactions.html"
                class="btn btn-ghost btn-sm"
                style="
                  display: inline-flex;
                  align-items: center;
                  margin-bottom: var(--space-md);
                  margin-left: -8px;
                "
              >
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="margin-right: 4px"
                >
                  <line x1="19" y1="12" x2="5" y2="12"></line>
                  <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Transactions
              </a>
              <h1 class="text-display" style="font-size: 28px">
                Add Transaction
              </h1>
            </header>

            <div class="transaction-type-toggle">
              <button class="type-btn active" data-type="expense">
                Expense
              </button>
              <button class="type-btn" data-type="income">Income</button>
              <button class="type-btn" data-type="transfer">Transfer</button>
            </div>

            <form
              class="card"
              style="padding: var(--space-xl)"
              onsubmit="event.preventDefault()"
            >
              <div class="form-group" style="margin-bottom: var(--space-lg)">
                <label for="amount" class="form-label">Amount</label>
                <div class="amount-input-wrapper">
                  <span class="currency-symbol">$</span>
                  <input
                    type="number"
                    id="amount"
                    class="form-input"
                    placeholder="0.00"
                    step="0.01"
                    min="0"
                    required
                    autofocus
                  />
                </div>
              </div>

              <div class="form-group">
                <label for="description" class="form-label"
                  >Description / Merchant</label
                >
                <input
                  type="text"
                  id="description"
                  class="form-input"
                  placeholder="e.g. Whole Foods Market"
                  required
                />
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="account" class="form-label">Account</label>
                  <select id="account" class="form-input" required>
                    <option value="" disabled selected>Select Account</option>
                    <option value="checking">Chase Checking (....1234)</option>
                    <option value="credit">Amex Sapphire (....5678)</option>
                    <option value="savings">Marcus Savings (....9012)</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="date" class="form-label">Date</label>
                  <input type="date" id="date" class="form-input" required />
                </div>
              </div>

              <div class="form-group">
                <label for="category" class="form-label">Category</label>
                <select id="category" class="form-input">
                  <option value="" disabled selected>Select Category</option>
                  <option value="food">Food & Dining</option>
                  <option value="groceries">Groceries</option>
                  <option value="transportation">Transportation</option>
                  <option value="shopping">Shopping</option>
                  <option value="housing">Housing & Rent</option>
                  <option value="utilities">Utilities</option>
                </select>
              </div>

              <div class="form-group">
                <label for="notes" class="form-label">Notes (Optional)</label>
                <textarea
                  id="notes"
                  class="form-input"
                  rows="3"
                  placeholder="Add any details about this transaction..."
                  style="height: auto; padding-top: 12px; resize: vertical"
                ></textarea>
              </div>

              <div class="btn-row">
                <button
                  type="button"
                  class="btn btn-ghost"
                  onclick="window.location.href = 'transactions.html'"
                >
                  Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                  Save Transaction
                </button>
              </div>
            </form>
          </div>
        </div>

        <div id="footer-container"></div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/transactions.js"></script>
    <script>

        initSidebar("transactions");
        initHeader();
        if (typeof loadComponent === "function") {
          loadComponent("../components/footer.html", "footer-container");
        }
    </script>
  </body>
</html>
