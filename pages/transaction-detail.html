<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FinanceME — Transaction Details." />

    <title>Transaction Detail — FinanceME</title>
    <link rel="icon" type="image/png" href="../Logo/logo_transparent.png" />

    <!-- ========== CSS ========== -->
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/transactions.css" />
  </head>

  <body>
    <div class="app-container">
      <div id="sidebar-container"></div>
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <div class="main-content">
        <div id="header-container"></div>

        <div class="content-wrapper">
          <div class="detail-container">
            <header class="page-header">
              <a
                href="transactions.html"
                class="btn btn-ghost btn-sm"
                style="
                  display: inline-flex;
                  align-items: center;
                  margin-left: -8px;
                "
              >
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="margin-right: 4px"
                >
                  <line x1="19" y1="12" x2="5" y2="12"></line>
                  <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back
              </a>
            </header>

            <div
              class="card"
              style="padding: 0 var(--space-xl) var(--space-xl) var(--space-xl)"
            >
              <div class="tx-hero">
                <div class="tx-amount">−EGP 142.50</div>
                <div class="tx-merchant">Whole Foods Market</div>
                <div class="tx-date">March 09, 2026 at 2:45 PM</div>
              </div>

              <div class="detail-list">
                <div class="detail-row">
                  <span class="detail-label">Status</span>
                  <span class="detail-value">
                    <span
                      class="category-dot"
                      style="background: var(--positive)"
                    ></span>
                    Settled
                  </span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">Category</span>
                  <span class="detail-value">
                    <span
                      class="category-dot"
                      style="background: #2ecc8a"
                    ></span>
                    Groceries
                  </span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">Account</span>
                  <span class="detail-value">Chase Checking (...1234)</span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">Transaction ID</span>
                  <span
                    class="detail-value"
                    style="font-family: var(--font-mono); font-size: 13px"
                    >TXN-84920184A</span
                  >
                </div>
                <div class="detail-row" style="align-items: flex-start">
                  <span class="detail-label" style="margin-top: 4px"
                    >Notes</span
                  >
                  <span
                    class="detail-value"
                    style="
                      text-align: right;
                      max-width: 60%;
                      font-weight: 400;
                      color: var(--text-secondary);
                    "
                  >
                    Weekly grocery run. Need to cut down on organic snacks.
                  </span>
                </div>
              </div>

              <div class="action-bar">
                <button class="btn btn-destructive">
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    style="margin-right: 6px"
                  >
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path
                      d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                    ></path>
                  </svg>
                  Delete
                </button>
                <button
                  class="btn btn-primary"
                  onclick="window.location.href = 'add-transaction.html'"
                >
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#0A0A0F"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    style="margin-right: 6px"
                  >
                    <path
                      d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                    ></path>
                    <path
                      d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                    ></path>
                  </svg>
                  Edit
                </button>
              </div>
            </div>
          </div>
        </div>

        <div id="footer-container"></div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="../js/utils.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/header.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        initSidebar("transactions");
        initHeader();
        if (typeof loadComponent === "function") {
          loadComponent("../components/footer.html", "footer-container");
        }
      });
    </script>
  </body>
</html>
